version: "3.9"

# ================================================================== #
#  Zero Trust Network Access — Full Stack                              #
#                                                                      #
#  Service map:                                                         #
#    idp          :8001  FIDO2 Identity Provider                       #
#    sdp-controller:8002  Policy Engine + Administrator                #
#    pep          :8081  Policy Enforcement Point                      #
#    ovp1         :8080  Client-facing overlay proxy                   #
#    ovp2         :8083  Resource-facing overlay proxy                 #
#    sdn-mgmt     :8084  SDN management API (wraps Ryu)               #
#    ryu          :8085  Ryu OpenFlow 1.3 REST API                    #
#                 :6653  OpenFlow wire protocol (OVS → Ryu)           #
#    ovs          —      Open vSwitch data plane                       #
# ================================================================== #

services:

  # ---------------------------------------------------------------- #
  #  Identity Provider (FIDO2 / JWT issuer)                          #
  # ---------------------------------------------------------------- #
  idp:
    build:
      context: .
      dockerfile: Dockerfile
    command: python IDP_IAM/idp_server.py
    ports:
      - "8001:8001"
    environment:
      - LOG_LEVEL=INFO
    networks:
      - ztna
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------- #
  #  SDP Controller (Policy Engine + Policy Administrator)           #
  # ---------------------------------------------------------------- #
  sdp-controller:
    build:
      context: .
      dockerfile: Dockerfile
    command: python SDP_Controller/sdp_controller.py
    ports:
      - "8002:8002"
    depends_on:
      idp:
        condition: service_healthy
    networks:
      - ztna
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------- #
  #  Ryu OpenFlow 1.3 Controller                                     #
  #  Python 3.8 image — separate Dockerfile in SDN_Controller/       #
  # ---------------------------------------------------------------- #
  ryu:
    build:
      context: ./SDN_Controller
      dockerfile: Dockerfile
    ports:
      - "6653:6653"   # OpenFlow protocol — OVS connects here
      - "8085:8085"   # Ryu WSGI REST API — PEP connects here
    networks:
      - ztna
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/ztna/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------- #
  #  Open vSwitch (data plane)                                       #
  #  Connects to Ryu controller on :6653                            #
  # ---------------------------------------------------------------- #
  ovs:
    image: openvswitch/ovs:3.1
    privileged: true          # Required for OVS kernel module
    networks:
      - ztna
    depends_on:
      - ryu
    entrypoint: >
      sh -c "
        /usr/share/openvswitch/scripts/ovs-ctl start --system-id=random &&
        sleep 3 &&
        ovs-vsctl add-br br-ztna &&
        ovs-vsctl set-controller br-ztna tcp:ryu:6653 &&
        ovs-vsctl set bridge br-ztna protocols=OpenFlow13 &&
        echo 'OVS bridge br-ztna configured → controller ryu:6653' &&
        tail -f /dev/null
      "
    healthcheck:
      test: ["CMD", "ovs-vsctl", "show"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ---------------------------------------------------------------- #
  #  Policy Enforcement Point                                        #
  # ---------------------------------------------------------------- #
  pep:
    build:
      context: .
      dockerfile: Dockerfile
    command: python SDP_Gateway/pep_server.py
    ports:
      - "8081:8081"
    depends_on:
      sdp-controller:
        condition: service_healthy
      ryu:
        condition: service_healthy
    environment:
      - PDP_URL=http://sdp-controller:8002
      - OVP2_URL=http://ovp2:8083
      - SDN_URL=http://ryu:8085
      - IDP_JWKS_URL=http://idp:8001/.well-known/jwks.json
    networks:
      - ztna
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------- #
  #  OVP1 — Client-facing overlay proxy                              #
  # ---------------------------------------------------------------- #
  ovp1:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      python -c "
      import uvicorn;
      from SDN_Controller.ovp_sdn import ovp1_app;
      uvicorn.run(ovp1_app, host='0.0.0.0', port=8080)
      "
    ports:
      - "8080:8080"
    depends_on:
      pep:
        condition: service_healthy
    environment:
      - PEP_URL=http://pep:8081
    networks:
      - ztna

  # ---------------------------------------------------------------- #
  #  OVP2 — Resource-facing overlay proxy                            #
  # ---------------------------------------------------------------- #
  ovp2:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      python -c "
      import uvicorn;
      from SDN_Controller.ovp_sdn import ovp2_app;
      uvicorn.run(ovp2_app, host='0.0.0.0', port=8083)
      "
    ports:
      - "8083:8083"
    depends_on:
      - pep
    networks:
      - ztna

  # ---------------------------------------------------------------- #
  #  SDN Management API — thin wrapper around Ryu REST               #
  # ---------------------------------------------------------------- #
  sdn-mgmt:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      python -c "
      import uvicorn;
      from SDN_Controller.ovp_sdn import sdn_app;
      uvicorn.run(sdn_app, host='0.0.0.0', port=8084)
      "
    ports:
      - "8084:8084"
    depends_on:
      ryu:
        condition: service_healthy
    environment:
      - RYU_API_URL=http://ryu:8085
    networks:
      - ztna

networks:
  ztna:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.0.0/24
